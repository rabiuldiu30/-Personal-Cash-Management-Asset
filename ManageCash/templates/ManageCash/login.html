{% extends 'ManageCash/base.html' %}

{% block content %}
<section class="auth-panel">
    <h1>Login</h1>
    <form method="post" class="form-panel">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p class="muted">New here? <a href="{% url 'register' %}">Create an account</a>.</p>
</section>
{% endblock %}
